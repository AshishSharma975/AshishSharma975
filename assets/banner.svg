<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 300" width="1400" height="300">

  <defs>
    <!-- Gradient -->
 <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#FBBF24"/>
  <stop offset="50%" stop-color="#FDE68A"/>
  <stop offset="100%" stop-color="#FFFFFF"/>
</linearGradient>

    <!-- FIXED Glow Filter (no double sharp text) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#070719"/>
  <!-- Network Background -->

<g opacity="0.3" stroke="#FBBF24" stroke-width="1">

  <line x1="80" y1="70" x2="180" y2="120"/>
  <line x1="180" y1="120" x2="320" y2="80"/>

  <line x1="1080" y1="70" x2="1220" y2="120"/>
  <line x1="1220" y1="120" x2="1350" y2="80"/>

</g>

<g fill="#FBBF24">

  <circle cx="80" cy="70" r="4"/>
  <circle cx="180" cy="120" r="4"/>
  <circle cx="320" cy="80" r="4"/>

  <circle cx="1080" cy="70" r="4"/>
  <circle cx="1220" cy="120" r="4"/>
  <circle cx="1350" cy="80" r="4"/>

</g>

  <!-- Glow Layer (blur only) -->
 <!-- Glow Layer -->
<text x="70" y="215"
      font-size="40"
      font-family="Inter, sans-serif"
      fill="#7ffcff"
      filter="url(#glow)"
      opacity="0.9">
  Full Stack &amp; 3D Web Developer • Building AI-Powered Experiences
</text>

<!-- Main Sharp Gradient Text -->
<text x="70" y="215"
      font-size="40"
      font-family="Inter, sans-serif"
      fill="url(#g)"
      font-weight="600">
  Full Stack &amp; 3D Web Developer • Building AI-Powered Experiences
</text>

</svg>
